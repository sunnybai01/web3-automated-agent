services:
  chat-api:
    build: .
    container_name: web3_agent_chat_api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn src.chat_api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"

  agent-app:
    build: .
    container_name: web3_agent_main
    env_file:
      - .env
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: unless-stopped
    command: python -m src.main

  postgres:
    image: pgvector/pgvector:pg16
    container_name: web3_agent_postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-web3agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-web3agent}
      POSTGRES_DB: ${POSTGRES_DB:-web3agent}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-web3agent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: web3_agent_chromadb
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

volumes:
  pgdata:
  chroma_data:
