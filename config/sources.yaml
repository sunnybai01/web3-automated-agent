  # ----- Tavily discovery (grants & hackathons not covered by any feed) -----
  - name: tavily_grants_discovery
    type: tavily_search
    url: ""
    schedule: grant_hackathon
    category: grant
    ecosystem: multi
    chain: multi
    fetch_method: tavily_search
    source_tier: discovery
    signal_type: discovery
    official: false
    query: '(site:gov.gitcoin.co OR site:gitcoin.co OR site:questbook.xyz OR site:retro9000.avax.network OR site:build.avax.network OR site:sui.io OR site:base.org) (grant OR grants OR rfp OR "builder program") ("apply now" OR "applications open" OR "grant portal" OR "request for proposals") -ambassador -hackathon -scholarship -fellowship -venture -series -valuation'
    max_results: 5
    search_depth: advanced
    topic: news
    days: 15
    enabled: true

  - name: tavily_hackathons_discovery
    type: tavily_search
    url: ""
    schedule: grant_hackathon
    category: hackathon
    ecosystem: multi
    chain: multi
    fetch_method: tavily_search
    source_tier: discovery
    signal_type: discovery
    official: false
    query: '(site:ethglobal.com OR site:dorahacks.io OR site:devpost.com OR site:taikai.network OR site:build.avax.network) (web3 OR crypto) (hackathon OR buildathon) ("registration open" OR "register now" OR "apply now" OR "prize pool") -recap -winner -highlights'
    max_results: 5
    search_depth: advanced
    topic: news
    days: 15
    enabled: true

