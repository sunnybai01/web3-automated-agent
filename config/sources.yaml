# Web3 Intelligence Agent — Seed Source Configuration
# Each source defines: type, url, fetch_method, schedule, keywords, ecosystem.
# Chain-aware metadata is now supported:
# - chain: canonical ecosystem id used by downstream registry-aware logic
# - source_tier: official | discovery
# - signal_type: grant | hackathon | bounty | social | discovery
# - official: convenience boolean for trust-aware processing
# Existing entries remain backward compatible because these fields are inferred
# at load time when omitted.

